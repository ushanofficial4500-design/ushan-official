<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ushan Official Photography</title>

<style>
body{
margin:0;
font-family:Arial;
background:#000;
color:white;
}

header{
background:black;
display:flex;
justify-content:space-between;
padding:15px 40px;
border-bottom:2px solid gold;
}

.logo{
color:gold;
font-size:28px;
font-weight:bold;
}

nav a{
color:white;
margin:0 10px;
text-decoration:none;
}

.hero{
height:90vh;
background:url("https://picsum.photos/1200/700") center/cover;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
}

.hero h1{
color:gold;
font-size:45px;
}

button{
padding:12px 20px;
background:red;
border:none;
color:white;
cursor:pointer;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:15px;
padding:40px;
}

.gallery img{
width:100%;
transition:0.4s;
}

.gallery img:hover{
transform:scale(1.1);
}

footer{
text-align:center;
padding:20px;
border-top:1px solid gold;
}
</style>

</head>

<body>

<header>
<div class="logo">Ushan Official</div>

<nav>
<a href="#">Home</a>
<a href="#">Portfolio</a>
<a href="#">Contact</a>
</nav>

</header>

<section class="hero">
<div>
<h1>Capturing Moments That Last Forever</h1>
<button>View Portfolio</button>
</div>
</section>

<section class="gallery">

<img src="https://picsum.photos/400/300?1">
<img src="https://picsum.photos/400/300?2">
<img src="https://picsum.photos/400/300?3">
<img src="https://picsum.photos/400/300?4">

</section>

<footer>
<p>© 2026 Ushan Official Photography</p>
</footer>

</body>

</html>
